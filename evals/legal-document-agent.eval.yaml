              Applies to deliverables: breach-notification-memo.docx
          - id: "C-031"
            operator: correctness
            outcome: |
              ISSUE_010: Concludes encryption safe harbor does NOT apply
              PASS if the memo explicitly concludes that the encryption safe harbor (under both HIPAA and state breach notification laws) does not apply, because although the data was encrypted at rest using AES-256, it was exfiltrated in unencrypted plaintext JSON format through the application layer. FAIL if the memo concludes the encryption safe harbor applies or does not address the safe harbor analysis.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-032"
            operator: correctness
            outcome: |
              ISSUE_010: Explains why at-rest encryption is insufficient here
              PASS if the memo explains the distinction between data encrypted at rest in the database and data returned in plaintext through the application layer/API, noting that the threat actor accessed decrypted data via application-layer queries, rendering the at-rest encryption irrelevant to the safe harbor analysis. FAIL if the memo merely states the safe harbor doesn't apply without explaining the at-rest vs. in-transit/application-layer distinction.
