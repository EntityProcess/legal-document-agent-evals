    input: |
      You are completing an AgentV adaptation of Harvey LAB task `data-privacy-cybersecurity/assess-breach-notification-obligations-across-affected-jurisdictions`.

      Source documents are available in the workspace at:
      `harvey-labs/tasks/data-privacy-cybersecurity/assess-breach-notification-obligations-across-affected-jurisdictions/documents/`

