          - id: "C-035"
            operator: correctness
            outcome: |
              ISSUE_012: Identifies health insurance data as triggering state-specific obligations
              PASS if the memo identifies that the compromised health insurance member IDs and group numbers may trigger additional or different obligations under state laws that specifically define 'personal information' to include health insurance information, or broadens the scope of notification requirements. FAIL if the memo does not address health insurance data as a category with potential separate legal significance under state breach notification statutes.
