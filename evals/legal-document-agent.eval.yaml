      Original Harvey LAB instructions:
      Review the attached incident documents and prepare a privileged breach notification obligations memo covering federal and multi-state requirements. Output: `breach-notification-memo.docx`.

      Expected deliverables:
      - breach-notification-memo.docx
    assertions:
      - name: harvey-lab-rubric
        type: llm-grader
        prompt: file://prompts/harvey-lab-grader.md
        rubrics:
          - id: "C-001"
            operator: correctness
            outcome: |
              ISSUE_001: Identifies May 2, 2025 as the likely HIPAA discovery date
              PASS if the memo analyzes the HIPAA 'discovery' date question and concludes or recommends that May 2, 2025 (the date the SOC first detected the anomalous activity) is the likely operative discovery date under 45 CFR §164.404(a)(2), rather than May 16, 2025 (the date of Dr. Haskell's formal determination). The memo should explain that HIPAA defines discovery as when the breach is first known or by exercising reasonable diligence would have been known. FAIL if the memo adopts May 16 as the discovery date without questioning it, or fails to analyze the discovery date issue at all.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-002"
            operator: correctness
            outcome: |
              ISSUE_001: Calculates 60-day HIPAA deadline as July 1, 2025
              PASS if the memo calculates the 60-day HIPAA notification deadline as July 1, 2025 (60 days from May 2, 2025). FAIL if the memo states the deadline is July 15, 2025 (based on May 16) without identifying that May 2 is the more conservative/correct start date, or fails to calculate a specific deadline.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-003"
            operator: correctness
            outcome: |
              ISSUE_001: Notes internal policy contradicts HHS guidance on discovery
              PASS if the memo identifies that Evergreen's internal HIPAA breach notification policy (which defines discovery as occurring when the Privacy Officer makes a formal determination) contradicts HHS OCR guidance on when discovery occurs. FAIL if the memo does not flag this discrepancy between internal policy and federal regulatory guidance.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-004"
            operator: correctness
            outcome: |
              ISSUE_002: Identifies HHS must be notified contemporaneously (500+ threshold)
              PASS if the memo states that because the breach affects more than 500 individuals, HHS must be notified contemporaneously with individual notifications (not at year-end), citing or referencing 45 CFR §164.406(a) or the HIPAA Breach Notification Rule's large breach reporting requirement. FAIL if the memo omits this requirement or states HHS can be notified at year-end.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-005"
            operator: correctness
            outcome: |
              ISSUE_002a: Identifies HIPAA media notification requirement under 45 CFR §164.408
              PASS if the memo identifies that HIPAA requires notification to prominent media outlets in each state where 500 or more residents are affected, citing or referencing 45 CFR §164.408 or the HIPAA Breach Notification Rule's media notification requirement. FAIL if the memo omits the HIPAA media notification requirement.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-006"
            operator: correctness
            outcome: |
              ISSUE_002b: Notes media notification applies to all 14 affected states
              PASS if the memo notes that all 14 affected states exceed the 500-individual threshold, triggering the HIPAA media notification obligation in every affected state. FAIL if the memo does not identify that the 500-person media threshold is met in all 14 states.
              Applies to deliverables: breach-notification-memo.docx
          - id: "C-007"
            operator: correctness
            outcome: |
              ISSUE_003: Identifies dual HIPAA status (BA for 312 clients, CE for 35 telehealth clients)
