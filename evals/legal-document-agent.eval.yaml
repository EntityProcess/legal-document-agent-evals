              Jurisdiction analysis covers Wisconsin, Ohio, Colorado, Connecticut, Washington, Massachusetts, and Montana
              PASS if the memo includes a jurisdiction-by-jurisdiction analysis that covers all 7 of these states: Wisconsin, Ohio, Colorado, Connecticut, Washington, Massachusetts, and Montana. FAIL if any of these 7 states is omitted from the jurisdictional analysis.
