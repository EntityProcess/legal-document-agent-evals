          - id: "C-034"
            operator: correctness
            outcome: |
              ISSUE_011: Recommends coordinating notification with Covered Entity clients
              PASS if the memo recommends coordinating the notification process with Covered Entity clients, including discussion of whether Evergreen should offer to handle notifications on behalf of clients to maintain consistency, control messaging, and manage litigation/indemnification risk. FAIL if the memo does not address coordination of notification efforts with the healthcare provider clients.
