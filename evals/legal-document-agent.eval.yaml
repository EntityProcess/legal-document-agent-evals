              PASS if the memo lists at least 5 of the following 7 categories of compromised data: (1) names, (2) dates of birth, (3) Social Security Numbers, (4) addresses, (5) health insurance information, (6) diagnosis/treatment information, (7) prescription history. FAIL if the memo lists fewer than 5 of these 7 categories or provides only a generic description without specifying data types.
