          - id: "C-029"
            operator: correctness
            outcome: |
              ISSUE_009: Identifies Washington AG notification requirement
              PASS if the memo identifies that Washington requires AG notification when 500 or more residents are affected (2,800 Washington residents affected here). FAIL if the memo omits Washington AG notification.
