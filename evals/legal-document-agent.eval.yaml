          - id: "C-033"
            operator: correctness
            outcome: |
              ISSUE_011: Flags BAA indemnification exposure from negligence
              PASS if the memo identifies that Evergreen's standard BAA (Section 7.1) contains an indemnification clause for breach-related costs caused by Evergreen's negligence, and that the unpatched vulnerability gives clients a strong argument that negligence caused the breach, creating significant indemnification exposure. FAIL if the memo does not discuss BAA indemnification liability.
