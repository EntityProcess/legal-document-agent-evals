          - id: "C-036"
            operator: correctness
            outcome: |
              Jurisdiction analysis covers Texas, California, Illinois, New York, Florida, Oregon, and Louisiana
              PASS if the memo includes a jurisdiction-by-jurisdiction analysis that covers all 7 of these states: Texas, California, Illinois, New York, Florida, Oregon, and Louisiana. FAIL if any of these 7 states is omitted from the jurisdictional analysis.
